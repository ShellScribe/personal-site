title: Paul Maxey
description: Cloud and platform engineering portfolio for Paul Maxey, focused on infrastructure, automation, reliability, and secure operations.
lang: en
url: "https://shellscribe.github.io"
baseurl: "/personal-site"
author: Paul Maxey
theme_color: "#05070d"
og_image: /assets/images/social/og-image.jpg
og_image_alt: Half-lit moon against a dark sky, used as the Paul Maxey portfolio preview image.

plugins:
  - jekyll-feed

markdown: kramdown
kramdown:
  input: GFM

header_pages:
  - about.md
  - experience.md
  - projects.md
  - skills.md
  - contact.md

exclude:
  - AGENTS.md
  - README.md
  - assets/images/motion/orion-satellite-signal.gif
  - docs/
  - _dev/
  - _scripts/
  - node_modules/
  - package-lock.json
  - package.json
