---
layout: default
---

<main id="main-content">
  <section class="hero" aria-labelledby="hero-title">
    <picture class="hero__media">
      <source media="(max-width: 720px)" srcset="{{ page.hero_image_small | relative_url }}">
      <img src="{{ page.hero_image | relative_url }}" alt="{{ page.hero_alt }}" width="1800" height="1012" fetchpriority="high">
    </picture>
    <div class="hero__overlay"></div>
    <div class="hero__content shell">
      <p class="eyebrow">{{ page.hero_kicker }}</p>
      <h1 id="hero-title">{{ page.hero_title }}</h1>
      <p class="hero__lede">
        I build cloud platforms that stay on course through growth, outages, migrations, and changing requirements.
      </p>
      <div class="hero__actions" aria-label="Primary links">
        <a class="button" href="{{ '/experience/' | relative_url }}">Experience</a>
        <a class="button button--ghost" href="{{ '/projects/' | relative_url }}">Selected Projects</a>
      </div>
    </div>
    <a class="hero-scroll-cue" href="#portfolio-sections" aria-label="Continue to portfolio sections">
      <span class="hero-scroll-cue__mark" aria-hidden="true"></span>
      <span class="visually-hidden">Continue to portfolio sections</span>
    </a>
  </section>

  <section id="portfolio-sections" class="home-grid shell" aria-label="Portfolio sections">
    {{ content }}
  </section>
</main>
